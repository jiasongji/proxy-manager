name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: bash -n proxy-manager.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck proxy-manager.sh

      - name: Public docs audit
        run: |
          placeholder="Y""OUR_"
          ! grep -RIn "${placeholder}GITHUB_ORG\|${placeholder}" README.md Proxy-Manager-部署运维手册.html Dockerfile
          ! grep -RInE 'BEGIN [A-Z ]*KEY|gho_[A-Za-z0-9_]+|ghp_[A-Za-z0-9_]+|AKIA[0-9A-Z]{16}' README.md Proxy-Manager-部署运维手册.html Dockerfile AUDIT.md
          ! grep -RInE 'scp|ssh -i|chmod 600|登录测试服务器|上传脚本' README.md Proxy-Manager-部署运维手册.html

      - name: Menu smoke tests
        run: |
          printf '\n' | bash proxy-manager.sh menu
          printf '0\n' | bash proxy-manager.sh menu
          printf '3\n\n\n' | bash proxy-manager.sh menu
          printf '3\n0\n0\n' | bash proxy-manager.sh menu
          printf 'x\n\n' | bash proxy-manager.sh menu
