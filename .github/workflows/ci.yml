name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bash syntax
        run: bash -n proxy-manager.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: ShellCheck
        run: shellcheck proxy-manager.sh

      - name: Public docs audit
        run: |
          placeholder="Y""OUR_"
          ! grep -RIn "${placeholder}GITHUB_ORG\|${placeholder}" README.md Proxy-Manager-部署运维手册.html Dockerfile AUDIT.md
          ! grep -RInE 'BEGIN [A-Z ]*KEY|gho_[A-Za-z0-9_]+|ghp_[A-Za-z0-9_]+|AKIA[0-9A-Z]{16}' README.md Proxy-Manager-部署运维手册.html Dockerfile AUDIT.md
          ! grep -RInE 'scp|ssh -i|chmod 600|登录测试服务器|上传脚本' README.md Proxy-Manager-部署运维手册.html
          ! grep -RInE 'B_SS_PASSWORD=[^<]|b-secret|legacy-any|legacy-naive|DR-LA_.*id_ed25519' README.md Proxy-Manager-部署运维手册.html Dockerfile AUDIT.md

      - name: CLI help smoke tests
        run: |
          bash proxy-manager.sh help >/tmp/pm-help.out
          bash proxy-manager.sh user help >/tmp/pm-user-help.out
          bash proxy-manager.sh route help >/tmp/pm-route-help.out
          bash proxy-manager.sh stats help >/tmp/pm-stats-help.out
          bash proxy-manager.sh traffic help >/tmp/pm-traffic-help.out
          bash proxy-manager.sh quota help >/tmp/pm-quota-help.out
          bash proxy-manager.sh backup help >/tmp/pm-backup-help.out
          bash proxy-manager.sh rollback help >/tmp/pm-rollback-help.out
          bash proxy-manager.sh upgrade help >/tmp/pm-upgrade-help.out

      - name: Menu smoke tests
        run: |
          printf '\n' | PM_TEST_ALLOW_NON_ROOT=1 bash proxy-manager.sh menu
          printf '0\n' | PM_TEST_ALLOW_NON_ROOT=1 bash proxy-manager.sh menu
          printf '3\n\n\n' | PM_TEST_ALLOW_NON_ROOT=1 bash proxy-manager.sh menu
          printf '4\n0\n0\n' | PM_TEST_ALLOW_NON_ROOT=1 bash proxy-manager.sh menu
          printf 'x\n\n' | PM_TEST_ALLOW_NON_ROOT=1 bash proxy-manager.sh menu

      - name: Generated config smoke tests
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/config"
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 -subj "/CN=example.com" -keyout "$tmp/key.pem" -out "$tmp/cert.pem" >/dev/null 2>&1
          cat > "$tmp/config/manager.env" <<EOF
          PM_DOMAIN=example.com
          PM_ROOT=$tmp
          PM_SERVER_IP=203.0.113.10
          PM_CONTAINER_NAME=pm-test
          PM_IMAGE=ghcr.io/sagernet/sing-box:latest
          PM_TZ=Asia/Shanghai
          PM_NODE_ROLE=entry_a
          ENABLE_ANYTLS=1
          ENABLE_NAIVE=1
          ENABLE_SS=0
          ANYTLS_PORT=30001
          NAIVE_PORT=30002
          SS_PORT=
          ANYTLS_NAME=proxy
          ANYTLS_PASSWORD=legacy-any
          NAIVE_USERNAME=legacy
          NAIVE_PASSWORD=legacy-naive
          SS_METHOD=aes-128-gcm
          SS_PASSWORD=
          B_SS_HOST=198.51.100.20
          B_SS_PORT=30003
          B_SS_METHOD=aes-128-gcm
          B_SS_PASSWORD=b-secret
          ROUTE_MODE=split
          ROUTE_B_CATEGORIES=ai,google
          ROUTE_B_CUSTOM_DOMAINS=
          ROUTE_B_CUSTOM_KEYWORDS=example-keyword
          ROUTE_B_INCLUDE_YOUTUBE=0
          ENABLE_V2RAY_API=0
          V2RAY_API_LISTEN=127.0.0.1:10085
          ENABLE_TRAFFIC_STATS=0
          ENABLE_QUOTA_ENFORCE=0
          CERT_FILE=$tmp/cert.pem
          KEY_FILE=$tmp/key.pem
          CREATED_AT='2026-06-15 00:00:00'
          EOF
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh route add-domain example.net >/tmp/pm-render-test.out
          jq -e '.outbounds[] | select(.tag=="egress-b")' "$tmp/config/sing-box.json" >/dev/null
          jq -e '.route.rule_set | length == 3' "$tmp/config/sing-box.json" >/dev/null
          jq -e '
            [.route.rule_set[] | select(
              .tag == "openai" and
              .type == "remote" and
              .format == "binary" and
              .url == "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/openai.srs" and
              .update_interval == "1d"
            )] | length == 1
          ' "$tmp/config/sing-box.json" >/dev/null
          jq -e '
            [.route.rule_set[] | select(
              .tag == "anthropic" and
              .type == "remote" and
              .format == "binary" and
              .url == "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/anthropic.srs" and
              .update_interval == "1d"
            )] | length == 1
          ' "$tmp/config/sing-box.json" >/dev/null
          jq -e '
            [.route.rule_set[] | select(
              .tag == "category-ai-not-cn" and
              .type == "remote" and
              .format == "binary" and
              .url == "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/sing/geo/geosite/category-ai-%21cn.srs" and
              .update_interval == "1d"
            )] | length == 1
          ' "$tmp/config/sing-box.json" >/dev/null
          jq -e '
            .route.rules[0].rule_set == ["openai"] and
            .route.rules[1].rule_set == ["anthropic"] and
            .route.rules[2].rule_set == ["category-ai-not-cn"]
          ' "$tmp/config/sing-box.json" >/dev/null
          jq -e '[.route.rules[0:3][] | select(.action == "route" and .outbound == "egress-b")] | length == 3' "$tmp/config/sing-box.json" >/dev/null
          jq -e '[.route.rules[]? | select((.domain_suffix // []) | index("example.net"))] | length == 1' "$tmp/config/sing-box.json" >/dev/null
          jq -e '[.route.rules[]? | select((.domain_keyword // []) | index("example-keyword"))] | length == 1' "$tmp/config/sing-box.json" >/dev/null
          jq -e '.inbounds[] | select(.tag=="anytls-in") | .users[0].name == "default"' "$tmp/config/sing-box.json" >/dev/null
          ! grep -R "claude.srs" "$tmp/config/sing-box.json" >/dev/null
          ! grep -R "b-secret" "$tmp/config/client" >/dev/null
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh check >/tmp/pm-singbox-check.out
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh route add-domain rollback.example >/tmp/pm-rollback-setup.out
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh backup list >/tmp/pm-backup-list.out
          grep -q 'manager.env' /tmp/pm-backup-list.out
          jq -e '[.route.rules[]? | select((.domain_suffix // []) | index("rollback.example"))] | length == 1' "$tmp/config/sing-box.json" >/dev/null
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh rollback latest >/tmp/pm-rollback.out
          jq -e '[.route.rules[]? | select((.domain_suffix // []) | index("example.net"))] | length == 1' "$tmp/config/sing-box.json" >/dev/null
          jq -e '[.route.rules[]? | select((.domain_suffix // []) | index("rollback.example"))] | length == 0' "$tmp/config/sing-box.json" >/dev/null
          PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh upgrade --image ghcr.io/sagernet/sing-box:latest >/tmp/pm-upgrade.out
          jq -e '.route.rules[0].rule_set == ["openai"] and .route.rules[1].rule_set == ["anthropic"] and .route.rules[2].rule_set == ["category-ai-not-cn"]' "$tmp/config/sing-box.json" >/dev/null
          if PM_TEST_ALLOW_NON_ROOT=1 PM_ROOT="$tmp" bash proxy-manager.sh upgrade --image ghcr.io/sagernet/sing-box:this-tag-should-not-exist >/tmp/pm-upgrade-fail.out 2>&1; then
            echo "Expected invalid-image upgrade to fail" >&2
            exit 1
          fi
          grep -q '候选镜像拉取失败' /tmp/pm-upgrade-fail.out
          grep -q 'PM_IMAGE=ghcr.io/sagernet/sing-box:latest' "$tmp/config/manager.env"
          rm -rf "$tmp"
